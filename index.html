<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnHub | Professional Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #050510;
            --accent: #00d2ff;
            --purple: #9d50bb;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            background: radial-gradient(circle at bottom left, #1a1a2e, #050510);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 500px;
            padding: 40px 0;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Glass Card */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-bottom: 25px;
        }

        h1, h2 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--accent), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Balance Display */
        .balance-box {
            font-size: 45px;
            font-weight: 700;
            margin: 15px 0;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }

        /* Cyber Inputs */
        input, select {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }

        /* Neon Button */
        .btn-neon {
            background: linear-gradient(45deg, var(--accent), var(--purple));
            border: none;
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            width: 100%;
            cursor: pointer;
            transition: 0.4s;
            letter-spacing: 1px;
        }

        .btn-neon:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        .user-info { font-size: 14px; color: #888; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <h1>EARNHUB</h1>
        <p class="user-info" id="uName">Loading User...</p>
        <div class="balance-box"><span id="uPoints">0</span> <small style="font-size: 18px;">CP</small></div>
        <p style="font-size: 12px; color: #aaa;">ඔබේ උපයන මුදල මෙතැනින් පෙන්වයි</p>
    </div>

    <div class="glass-card">
        <h2 style="font-size: 18px;">WITHDRAW CASH</h2>
        <input type="number" id="cashAmount" placeholder="Amount (Minimum 500)">
        
        <select id="payMethod">
            <option value="Reload">Dialog / Mobitel Reload</option>
            <option value="EzCash">EzCash / mCash</option>
            <option value="Bank">Bank Transfer</option>
        </select>

        <input type="text" id="payDetails" placeholder="Phone Number / Bank Info">
        
        <button class="btn-neon" onclick="requestWithdraw()">CLAIM REWARD</button>
    </div>

    <button onclick="auth.signOut().then(() => location.reload())" style="background:none; border:none; color:#555; cursor:pointer; text-decoration:underline;">Logout Account</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCBW21NQG7100ZQ_phXtVPiY-IWRzNCGu0",
        authDomain: "earn-money-600d9.firebaseapp.com",
        databaseURL: "https://earn-money-600d9-default-rtdb.firebaseio.com",
        projectId: "earn-money-600d9",
        storageBucket: "earn-money-600d9.firebasestorage.app",
        messagingSenderId: "12987052490",
        appId: "1:12987052490:web:4b349f2ad5a1812d9adf33"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('uName').innerText = user.displayName || "Gamer";
            db.ref('users/' + user.uid + '/points').on('value', snap => {
                document.getElementById('uPoints').innerText = snap.val() || 0;
            });
        } else {
            // Login නැත්නම් redirect කරන්න පුළුවන්
            window.location.href = "login.html"; 
        }
    });

    function requestWithdraw() {
        const pts = parseInt(document.getElementById('cashAmount').value);
        const method = document.getElementById('payMethod').value;
        const details = document.getElementById('payDetails').value;
        const currentPts = parseInt(document.getElementById('uPoints').innerText);

        if(!pts || pts < 500) return alert("අවම 500 CP ඇතුළත් කරන්න!");
        if(!details) return alert("කරුණාකර ගෙවීම් විස්තර ඇතුළත් කරන්න!");
        if(currentPts < pts) return alert("ඔබ සතුව ප්‍රමාණවත් CP නැත!");

        const data = {
            name: auth.currentUser.displayName || "User",
            amount: pts,
            method: method,
            details: details,
            status: 'pending',
            secret: 'DEXTER_ADMIN_99', // Admin පැනල් එකට පෙනෙන්න මේක අනිවාර්යයි
            timestamp: Date.now()
        };

        db.ref('requests').push(data).then(() => {
            db.ref('users/' + auth.currentUser.uid + '/points').set(currentPts - pts);
            alert("සාර්ථකයි! පැය 24ක් ඇතුළත ගෙවීම් ලැබෙනු ඇත.");
            document.getElementById('cashAmount').value = "";
            document.getElementById('payDetails').value = "";
        }).catch(e => alert("Error: " + e.message));
    }
</script>

</body>
</html>
