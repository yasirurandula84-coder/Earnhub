<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnHub Elite | Secure Typing Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #00d2ff; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; text-align: center; }
        .app-container { max-width: 450px; margin: auto; padding: 20px; }
        .glass-card { background: var(--card); backdrop-filter: blur(15px); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        .btn-primary { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; }
        .btn-google { background: white; color: #333; }
        .link-text { font-size: 13px; color: var(--primary); cursor: pointer; text-decoration: underline; display: block; margin-top: 10px; }
        #authSection, #dashboard, #verifyNotice { display: none; }
        .task-box { background: #1a1a2e; padding: 15px; border-radius: 12px; margin-bottom: 15px; font-weight: 600; color: var(--primary); border: 1px dashed var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <div id="authSection" class="glass-card" style="display: block; margin-top: 50px;">
        <h2 id="authTitle">Login</h2>
        <div id="regFields" style="display: none;"><input type="text" id="regName" placeholder="Full Name"></div>
        <input type="email" id="authEmail" placeholder="Email Address">
        <input type="password" id="authPass" placeholder="Password">
        <button id="mainAuthBtn" class="btn btn-primary" onclick="handleAuth()">Login</button>
        <button class="btn btn-google" onclick="signInWithGoogle()">Sign in with Google</button>
        <span class="link-text" id="toggleLink" onclick="toggleAuth(true)">Register here</span>
        <span class="link-text" onclick="resetPass()">Forgot Password?</span>
    </div>

    <div id="verifyNotice" class="glass-card">
        <h2>📧 Verify Your Email</h2>
        <p>ඔබේ Email ලිපිනයට තහවුරු කිරීමේ ලින්ක් එකක් එවා ඇත. කරුණාකර එය පරීක්ෂා කර ලින්ක් එක click කරන්න.</p>
        <button class="btn btn-primary" onclick="location.reload()">I Verified, Refresh Now</button>
        <button class="btn btn-google" style="background:#ff4757; color:white;" onclick="signOut()">Logout</button>
    </div>

    <div id="dashboard">
        <div class="glass-card">
            <h3>Welcome, <span id="uNameDisp">...</span></h3>
            <div id="uPoints" style="font-size: 32px; color: #2ecc71; font-weight: 800;">0 CP</div>
            <button class="btn btn-primary" style="background:#ff4757; padding: 8px; margin-top:10px;" onclick="signOut()">Logout</button>
        </div>

        <div class="glass-card">
            <div class="task-box" id="targetText">Loading...</div>
            <textarea id="userInput" class="task-box" style="width:100%; color:white; border-style: solid;" placeholder="Start typing..."></textarea>
            <button class="btn btn-primary" onclick="submitTask()">Submit & Earn 10 CP</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCBW21NQG7100ZQ_phXtVPiY-IWRzNCGu0",
        authDomain: "earn-money-600d9.firebaseapp.com",
        databaseURL: "https://earn-money-600d9-default-rtdb.firebaseio.com",
        projectId: "earn-money-600d9",
        storageBucket: "earn-money-600d9.firebasestorage.app",
        messagingSenderId: "12987052490",
        appId: "1:12987052490:web:4b349f2ad5a1812d9adf33"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let isRegister = false;

    function toggleAuth(reg) {
        isRegister = reg;
        document.getElementById("authTitle").innerText = reg ? "Register" : "Login";
        document.getElementById("regFields").style.display = reg ? "block" : "none";
        document.getElementById("toggleLink").innerText = reg ? "Login here" : "Register here";
        document.getElementById("toggleLink").onclick = () => toggleAuth(!reg);
    }

    async function handleAuth() {
        const email = document.getElementById("authEmail").value;
        const pass = document.getElementById("authPass").value;
        const name = document.getElementById("regName").value;

        try {
            if (isRegister) {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await res.user.updateProfile({ displayName: name });
                await db.ref('users/' + res.user.uid).set({ name: name, points: 0 });
                // Firebase Verification Email යැවීම
                await res.user.sendEmailVerification();
                alert("Verification link sent to your email!");
            } else {
                await auth.signInWithEmailAndPassword(email, pass);
            }
        } catch (e) { alert(e.message); }
    }

    function resetPass() {
        const email = document.getElementById("authEmail").value;
        if(!email) return alert("Enter email!");
        auth.sendPasswordResetEmail(email).then(() => alert("Reset link sent!"));
    }

    function signInWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function signOut() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById("authSection").style.display = "none";
            // Check if email is verified
            if (user.emailVerified || user.providerData[0].providerId === "google.com") {
                document.getElementById("dashboard").style.display = "block";
                document.getElementById("verifyNotice").style.display = "none";
                document.getElementById("uNameDisp").innerText = user.displayName;
                db.ref('users/' + user.uid + '/points').on('value', s => {
                    document.getElementById("uPoints").innerText = (s.val() || 0) + " CP";
                });
                nextTask();
            } else {
                document.getElementById("verifyNotice").style.display = "block";
                document.getElementById("dashboard").style.display = "none";
            }
        } else {
            document.getElementById("authSection").style.display = "block";
        }
    });

    const tasks = ["Practice makes perfect", "Success is near", "Type fast to earn"];
    function nextTask() {
        document.getElementById("targetText").innerText = tasks[Math.floor(Math.random() * tasks.length)];
        document.getElementById("userInput").value = "";
    }

    function submitTask() {
        const input = document.getElementById("userInput").value.trim();
        const target = document.getElementById("targetText").innerText.trim();
        if (input === target) {
            window.open('https://www.effectivegatecpm.com/bfifb4kf8?key=4848fcef5dd96ae01528e28c2c90fd4f', '_blank');
            db.ref('users/' + auth.currentUser.uid + '/points').transaction(p => (p || 0) + 10);
            nextTask();
        } else { alert("Incorrect!"); }
    }
</script>
</body>
</html>
