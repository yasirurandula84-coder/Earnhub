<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnHub Elite | Official Professional Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --success: #2ecc71; --warning: #f1c40f; --glass: rgba(255, 255, 255, 0.07); }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at top right, #1e1e2f, #0f0c29); min-height: 100vh; margin: 0; color: #fff; overflow-x: hidden; }
        
        .app-container { width: 100%; max-width: 480px; margin: 20px auto; padding: 0 15px; }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); padding: 25px 20px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        /* Auth Styles */
        input { width: 100%; padding: 14px; border: none; border-radius: 12px; background: rgba(255, 255, 255, 0.1); color: #fff; margin-bottom: 12px; outline: none; border: 1px solid transparent; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.15); }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(45deg, var(--secondary), var(--primary)); color: #fff; font-weight: 600; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn-action:active { transform: scale(0.98); }
        .link-btn { font-size: 13px; color: var(--primary); cursor: pointer; text-decoration: underline; display: block; margin-top: 10px; }

        /* Dashboard Styles */
        .balance-box { font-size: 32px; font-weight: 800; color: var(--success); text-shadow: 0 0 15px rgba(46, 204, 113, 0.4); margin: 10px 0; }
        .task-display { background: #161625; padding: 20px; border-radius: 15px; border: 1px dashed var(--primary); margin: 15px 0; font-weight: 600; letter-spacing: 0.5px; }
        textarea { width: 100%; height: 100px; padding: 12px; border-radius: 12px; background: rgba(0,0,0,0.2); color: white; border: 1px solid rgba(255,255,255,0.1); resize: none; margin-bottom: 15px; }
        
        #authSection, #mainDashboard { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="authSection" class="glass-card" style="display: block; margin-top: 60px;">
        <h1 id="authTitle" style="margin-bottom: 10px;">Login</h1>
        <p id="authSub" style="color: #aaa; font-size: 14px; margin-bottom: 25px;">Welcome to EarnHub Elite</p>

        <div id="regFields" style="display: none;">
            <input type="text" id="regName" placeholder="Your Full Name">
        </div>
        <input type="email" id="authEmail" placeholder="Email Address">
        <input type="password" id="authPass" placeholder="Password">
        
        <button class="btn-action" id="mainAuthBtn" onclick="handleAuth()">Login to Account</button>
        <button class="btn-action" style="background: #fff; color: #222;" onclick="signInWithGoogle()">Sign in with Google</button>
        
        <span class="link-btn" id="toggleLink" onclick="toggleAuth(true)">New here? Create an Account</span>
        <span class="link-btn" id="resetBtn" onclick="forgotPassword()" style="color: #888;">Forgot Password?</span>
    </div>

    <div id="mainDashboard">
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; text-align: left;">
                <div>
                    <small style="color: #888;">Worker</small><br>
                    <strong id="uNameDisp">Loading...</strong>
                </div>
                <button onclick="logout()" style="background: rgba(255,0,0,0.1); color: #ff4757; border: 1px solid #ff4757; padding: 5px 12px; border-radius: 8px; cursor: pointer;">Logout</button>
            </div>
            <div class="balance-box" id="uPointsDisp">0 CP</div>
            <p style="font-size: 12px; color: #888;">Minimum Withdraw: 500 CP</p>
        </div>

        <div class="glass-card">
            <h3 style="margin-top: 0; color: var(--warning);">Typing Task</h3>
            <p style="font-size: 13px; color: #ccc;">පහත වාක්‍යය නිවැරදිව ටයිප් කරන්න:</p>
            <div class="task-display" id="targetText">Loading Task...</div>
            <textarea id="userInput" placeholder="මෙතන ටයිප් කරන්න..."></textarea>
            <button class="btn-action" onclick="submitTask()">Submit & Earn 10 CP</button>
        </div>
    </div>
</div>

<script>
    // --- Firebase Configuration ---
    const firebaseConfig = {
        apiKey: "AIzaSyCBW21NQG7100ZQ_phXtVPiY-IWRzNCGu0",
        authDomain: "earn-money-600d9.firebaseapp.com",
        databaseURL: "https://earn-money-600d9-default-rtdb.firebaseio.com",
        projectId: "earn-money-600d9",
        storageBucket: "earn-money-600d9.firebasestorage.app",
        messagingSenderId: "12987052490",
        appId: "1:12987052490:web:4b349f2ad5a1812d9adf33"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const provider = new firebase.auth.GoogleAuthProvider();

    // --- EmailJS Setup ---
    emailjs.init("CpK7Sb10QnKQlsqJa");

    let isRegister = false;
    const taskList = [
        "Believe in yourself and all that you are",
        "Success is a journey not a destination",
        "Consistency is the key to big results",
        "Type fast and earn more with EarnHub",
        "The best way to predict future is to create it"
    ];

    // --- Auth Logic ---
    function toggleAuth(reg) {
        isRegister = reg;
        document.getElementById("authTitle").innerText = reg ? "Register" : "Login";
        document.getElementById("mainAuthBtn").innerText = reg ? "Create Account" : "Login to Account";
        document.getElementById("regFields").style.display = reg ? "block" : "none";
        document.getElementById("toggleLink").innerText = reg ? "Already have an account? Login" : "New here? Create an Account";
        document.getElementById("toggleLink").onclick = () => toggleAuth(!reg);
        document.getElementById("resetBtn").style.display = reg ? "none" : "block";
    }

    async function handleAuth() {
        const email = document.getElementById("authEmail").value;
        const pass = document.getElementById("authPass").value;
        const name = document.getElementById("regName").value;

        if(!email || !pass) return alert("Please enter email and password!");

        try {
            if (isRegister) {
                if(!name) return alert("Please enter your name!");
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await res.user.updateProfile({ displayName: name });
                await db.ref('users/' + res.user.uid).set({ name: name, points: 0, email: email });
                
                // Welcome Email
                sendWelcomeMail(name, email);
                alert("Account created! Welcome email sent.");
            } else {
                await auth.signInWithEmailAndPassword(email, pass);
            }
        } catch (e) { alert(e.message); }
    }

    function sendWelcomeMail(name, email) {
        // සටහන: මෙහි 'template_welcome' යනු ඔබ EmailJS හි සාදාගත යුතු අලුත් Template ID එකකි
        emailjs.send('service_6awotbe', 'template_welcome', {
            to_name: name,
            to_email: email,
            message: "EarnHub Elite වෙත ඔබව සාදරයෙන් පිළිගනිමු! දැන් ඔබට ටයිප් කර මුදල් ඉපයිය හැක."
        });
    }

    function forgotPassword() {
        const email = document.getElementById("authEmail").value;
        if(!email) return alert("Enter your email first!");
        auth.sendPasswordResetEmail(email).then(() => alert("Reset link sent to your email!"));
    }

    function signInWithGoogle() { auth.signInWithPopup(provider); }
    function logout() { auth.signOut().then(() => location.reload()); }

    // --- Core Functionality ---
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById("authSection").style.display = "none";
            document.getElementById("mainDashboard").style.display = "block";
            document.getElementById("uNameDisp").innerText = user.displayName || "Elite Member";
            
            db.ref('users/' + user.uid + '/points').on('value', s => {
                document.getElementById("uPointsDisp").innerText = (s.val() || 0) + " CP";
            });
            nextTask();
        } else {
            document.getElementById("authSection").style.display = "block";
            document.getElementById("mainDashboard").style.display = "none";
        }
    });

    function nextTask() {
        document.getElementById("targetText").innerText = taskList[Math.floor(Math.random() * taskList.length)];
        document.getElementById("userInput").value = "";
    }

    function submitTask() {
        const input = document.getElementById("userInput").value.trim();
        const target = document.getElementById("targetText").innerText.trim();

        if (input === target) {
            // Ad Trigger
            window.open('https://www.effectivegatecpm.com/bfifb4kf8?key=4848fcef5dd96ae01528e28c2c90fd4f', '_blank');
            
            db.ref('users/' + auth.currentUser.uid + '/points').transaction(p => (p || 0) + 10);
            alert("Success! +10 CP earned.");
            nextTask();
        } else {
            alert("Typed text is incorrect!");
        }
    }
</script>
</body>
</html>
